    .iframe-container {

    .loading-overlay {

    .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

        .nav-btn:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 10px 30px rgba(155,89,182,.6);letter-spacing:1.2px}

        .nav-btn .btn-text{position:relative;z-index:2;display:flex;align-items:center;gap:6px}
        .nav-btn .btn-icon{font-size:16px;transition:transform .3s ease}
        .nav-btn:hover .btn-icon{transform:rotate(15deg)}
        
        /* 游戏区域样式 */
